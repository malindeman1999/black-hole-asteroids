<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Black Hole Tetra Prototype</title>
  <style>
    :root {
      --bg0: #07121f;
      --bg1: #0d1f34;
      --panel: rgba(10, 24, 41, 0.75);
      --text: #e4f0ff;
      --muted: #9bb3d0;
      --accent: #73d0ff;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 10%, #1a3552 0%, var(--bg0) 45%, #040a13 100%);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: var(--panel);
      border: 1px solid rgba(115, 208, 255, 0.3);
      border-radius: 8px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
      min-width: 260px;
      line-height: 1.35;
      font-size: 13px;
    }
    #hud .title {
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    #hud .row {
      color: var(--muted);
      margin: 3px 0;
      white-space: pre;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div class="title">Inertial Tetra Preview</div>
    <div class="row" id="status">status: booting</div>
    <div class="row" id="time">t: 0.000 s</div>
    <div class="row" id="dirs">corner dir: []</div>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
